<div class="tarjeta-gigante" style="max-width: 800px; margin: 0 auto;">
  <p>Estás viendo los detalles de:</p>
  <div class="simbolo">{{ idMoneda() }}</div>

  <div style="background: #2a2a2a; color: white; padding: 20px; border-radius: 8px; margin-top: 20px; text-align: left;">
    <h3 style="color: #00bcd4;">📰 Últimas Noticias:</h3>
    
    <div [innerHTML]="noticiaHacker"></div>
    
  </div>

  <div style="margin-top: 20px;">
    <h3 style="color: #00bcd4;">📺 Análisis en Vídeo:</h3>
    
    @if (urlVideoSegura()) {
      <iframe 
        width="100%" 
        height="315" 
        [src]="urlVideoSegura()" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
      </iframe>
    }
  </div>

</div>
