<div class="moneda-card">
  <div>
    <strong>{{moneda.nombre}}</strong> ({{moneda.simbolo}})
  </div>
  
  <div>
    @switch (obtenerEstadoMercado()) {
      @case ('alcista') {
        <span class="verde">🔥 Alcista {{ moneda.precio | currency:'EUR' }}</span>
      }

      @case ('bajista') {
        <span class="rojo">🥶 Bajista: {{ moneda.precio | currency:'EUR' }}</span>
      }
      
      @default {
        <span class="gris">⚖️ Estable: {{ moneda.precio | currency:'EUR' }}</span>
      }
    }
  </div>

  <button 
    (click)="comprado.emit(moneda.nombre)" 
    class="botonComprar">
    Comprar
  </button>
  <button [routerLink]="['/moneda', moneda.simbolo]" class="botonVerDetalles">Ver Detalles</button>
</div>
