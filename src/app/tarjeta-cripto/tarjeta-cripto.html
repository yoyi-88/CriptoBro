<div class="moneda-card">
  <div>
    <strong>{{moneda.nombre}}</strong> ({{moneda.simbolo}})
  </div>
  
  <div>
    @if (moneda.tendencia > 0) {
      <span class="verde">{{moneda.precio | currency:'EUR'}} ({{moneda.tendencia | tendencia}})</span>
    } @else {
      <span class="rojo">{{moneda.precio | currency:'EUR'}} ({{moneda.tendencia | tendencia}})</span>
    }
  </div>

  <button [routerLink]="['/moneda', moneda.simbolo]">Ver Detalles</button>
</div>
